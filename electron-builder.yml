appId: com.dustforge.app
productName: DustForge
copyright: Copyright © 2024 DustForge Contributors

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*

extraResources:
  - from: resources/icon.ico
    to: icon.ico

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  requestedExecutionLevel: requireAdministrator

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: DustForge
  artifactName: DustForge-Setup-${version}.${ext}

publish:
  provider: github
  releaseType: release
