name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-args: --win
          - os: macos-latest
            build-args: --mac
          - os: ubuntu-latest
            build-args: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, package, and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx electron-vite build && npx electron-builder ${{ matrix.build-args }} --publish always

  release-notes:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate changelog and update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          npx conventional-changelog -p angular -r 1 -o _RELEASE_NOTES.md
          for i in 1 2 3 4 5; do
            gh release edit ${{ github.ref_name }} --notes-file _RELEASE_NOTES.md && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
