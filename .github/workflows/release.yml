name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npx electron-vite build && npx electron-builder --publish never

      - name: Create GitHub Release and upload installer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = Get-ChildItem dist/DustForge-Setup-*.exe | Select-Object -First 1
          gh release create $tag $exe.FullName --title $tag --generate-notes
