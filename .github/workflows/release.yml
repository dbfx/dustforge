name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, package, and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx electron-vite build && npx electron-builder --publish always

      - name: Generate changelog and update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          npx conventional-changelog -p angular -r 1 -o _RELEASE_NOTES.md
          gh release edit ${{ github.ref_name }} --notes-file _RELEASE_NOTES.md
